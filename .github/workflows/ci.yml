name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Swift version
        run: swift --version

      - name: Lint
        run: |
          brew install swiftlint
          swiftlint --strict

      - name: Test
        run: swift test --parallel

      - name: Resolve version
        id: version
        run: |
          VERSION="$(cat VERSION)-ci.${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build .app
        run: ./scripts/build-app.sh "${{ steps.version.outputs.version }}" "${GITHUB_RUN_NUMBER}"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: ./scripts/make-dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WriteAssist-${{ steps.version.outputs.version }}
          path: build/WriteAssist-${{ steps.version.outputs.version }}.dmg
          retention-days: 14
